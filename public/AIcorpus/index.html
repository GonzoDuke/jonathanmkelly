<style>
  :root{
    --paper:#DFE4E8;        /* endpaper blue-gray */
    --card:#FAF9F5;         /* card stock */
    --ink:#1C2630;          /* reading ink */
    --ink-soft:#5A6573;
    --rule:#C4CBD2;
    --rule-card:#D8D2C4;
    --accent:#1C2630;
    /* camps */
    --c-critical:#A14334;
    --c-pro:#2F6B4F;
    --c-defl:#8A6D2F;
    --c-context:#54678C;
    /* relations */
    --r-supports:#2E7D5B;
    --r-contradicts:#B3402E;
    --r-complicates:#C28E2D;
    --r-grounds:#3A6EA5;
    --r-paired:#7A5C9E;
    --serif: "Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
    --mono: ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--serif);
    background:var(--paper);
    color:var(--ink);
    display:flex;flex-direction:column;
    overflow:hidden;
  }
  /* ---------- header ---------- */
  header{
    padding:14px 20px 10px;
    border-bottom:1.5px solid var(--ink);
    background:var(--paper);
    flex:0 0 auto;
  }
  .masthead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .masthead h1{font-size:21px;font-weight:600;letter-spacing:.01em}
  .masthead .count{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.06em}
  .masthead .search-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
  #search{
    font-family:var(--serif);font-size:14px;
    border:1px solid var(--ink);border-radius:0;
    background:var(--card);color:var(--ink);
    padding:6px 10px;width:280px;outline:none;
  }
  #search:focus{box-shadow:0 0 0 2px rgba(28,38,48,.18)}
  #clearBtn{
    font-family:var(--mono);font-size:11px;background:none;border:1px solid var(--rule);
    color:var(--ink-soft);padding:5px 8px;cursor:pointer;
  }
  #clearBtn:hover{border-color:var(--ink);color:var(--ink)}
  .filters{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .fgroup{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .flabel{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase;margin-right:2px}
  .chip{
    font-family:var(--mono);font-size:11px;letter-spacing:.02em;
    border:1px solid var(--rule);background:transparent;color:var(--ink-soft);
    padding:3px 9px;cursor:pointer;border-radius:11px;
    display:inline-flex;align-items:center;gap:6px;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .chip.active{border-color:var(--ink);color:var(--ink);background:var(--card)}
  .chip:focus-visible,#search:focus-visible,button:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
  select#sectionSel{
    font-family:var(--mono);font-size:11px;border:1px solid var(--rule);
    background:transparent;color:var(--ink);padding:3px 6px;max-width:280px;
  }
  .edge-toggle{cursor:pointer}
  .edge-toggle .swatch{width:16px;height:3px;display:inline-block;border-radius:2px}
  .edge-toggle.off{opacity:.35;text-decoration:line-through}
  /* ---------- main split ---------- */
  main{flex:1 1 auto;display:flex;min-height:0}
  #graphPane{flex:1 1 62%;position:relative;min-width:0}
  #graph{width:100%;height:100%;display:block;cursor:grab}
  #graph:active{cursor:grabbing}
  .hint{
    position:absolute;left:14px;bottom:10px;
    font-family:var(--mono);font-size:10px;color:var(--ink-soft);letter-spacing:.04em;
    pointer-events:none;
  }
  #tooltip{
    position:absolute;pointer-events:none;display:none;
    background:var(--ink);color:var(--card);
    font-family:var(--mono);font-size:11px;line-height:1.45;
    padding:6px 9px;max-width:300px;z-index:30;
  }
  /* ---------- right panel ---------- */
  #panel{
    flex:0 0 38%;max-width:520px;min-width:330px;
    border-left:1.5px solid var(--ink);
    background:var(--paper);
    display:flex;flex-direction:column;min-height:0;
  }
  #panelScroll{flex:1 1 auto;overflow-y:auto;padding:16px 18px 28px}
  /* list view */
  .list-row{
    display:flex;align-items:baseline;gap:9px;
    padding:7px 4px;border-bottom:1px solid var(--rule);cursor:pointer;
  }
  .list-row:hover{background:rgba(250,249,245,.7)}
  .list-row .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;position:relative;top:0}
  .list-row .lr-name{font-size:14.5px}
  .list-row .lr-meta{font-family:var(--mono);font-size:10px;color:var(--ink-soft);margin-left:auto;text-align:right;letter-spacing:.03em;flex:0 0 auto}
  .list-head{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:4px 0 8px}
  .empty{font-style:italic;color:var(--ink-soft);padding:18px 4px;font-size:14px}
  /* catalog card */
  .card{
    background:var(--card);
    border:1px solid var(--ink);
    box-shadow:3px 3px 0 rgba(28,38,48,.16);
    padding:0 0 26px;position:relative;
  }
  .card::after{ /* the punch hole */
    content:"";position:absolute;left:50%;bottom:9px;transform:translateX(-50%);
    width:13px;height:13px;border-radius:50%;
    background:var(--paper);border:1px solid var(--ink);
  }
  .card-top{
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);
    padding:8px 14px;border-bottom:1px solid var(--rule-card);
  }
  .card-top .camp-tag{display:flex;align-items:center;gap:6px;color:var(--ink)}
  .card-top .dot{width:8px;height:8px;border-radius:50%}
  .card-body{padding:13px 16px 6px}
  .card-body h2{font-size:18px;font-weight:600;line-height:1.3;margin-bottom:2px}
  .card-body .byline{font-style:italic;color:var(--ink-soft);font-size:13.5px;margin-bottom:10px}
  .card-body .typeline{
    font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);
    border-top:1px solid var(--rule-card);border-bottom:1px solid var(--rule-card);
    padding:6px 0;margin-bottom:11px;letter-spacing:.02em;line-height:1.5;
  }
  .card-body .claim{font-size:14.5px;line-height:1.62}
  .read-link{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin-top:13px;padding:9px 12px;text-decoration:none;
    font-family:var(--mono);font-size:12px;letter-spacing:.02em;
    color:var(--ink);background:var(--card);border:1px solid var(--ink);border-radius:6px;
  }
  .read-link:hover{background:var(--ink);color:var(--paper)}
  .read-link .lt{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em}
  .read-link:hover .lt{color:var(--paper)}
  .themes{margin-top:11px;display:flex;flex-wrap:wrap;gap:5px}
  .theme{
    font-family:var(--mono);font-size:10px;color:var(--ink-soft);
    border:1px solid var(--rule-card);padding:2px 7px;border-radius:9px;cursor:pointer;
  }
  .theme:hover{color:var(--ink);border-color:var(--ink)}
  .rel-section{padding:4px 16px 0;margin-top:10px}
  .rel-head{
    font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;margin:12px 0 5px;
  }
  .rel-head .swatch{width:18px;height:3px;border-radius:2px}
  .rel-item{
    display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    font-family:var(--serif);font-size:13.5px;color:var(--ink);
    padding:5px 2px;border-bottom:1px dotted var(--rule-card);line-height:1.45;
  }
  .rel-item:hover .rel-target{text-decoration:underline}
  .rel-item .rel-arrow{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-right:4px}
  .rel-item .rel-target{font-weight:600}
  .rel-item .rel-note{display:block;font-style:italic;color:var(--ink-soft);font-size:12.5px;margin-top:1px}
  .backlink{
    font-family:var(--mono);font-size:11px;background:none;border:none;color:var(--ink-soft);
    cursor:pointer;padding:0 0 10px;letter-spacing:.05em;
  }
  .backlink:hover{color:var(--ink)}
  /* graph elements */
  .node-label{
    font-family:var(--mono);font-size:9.5px;fill:var(--ink);
    pointer-events:none;text-anchor:middle;letter-spacing:.02em;
  }
  /* mobile */
  @media (max-width: 880px){
    main{flex-direction:column}
    #graphPane{flex:1 1 52%}
    #panel{flex:1 1 48%;max-width:none;min-width:0;border-left:none;border-top:1.5px solid var(--ink)}
    .masthead .search-wrap{margin-left:0;width:100%}
    #search{flex:1}
  }
  @media (max-width: 560px){
    /* phone: lead with the searchable list; keep the graph as a compact header */
    #graphPane{flex:1 1 40vh;min-height:230px}
    #panel{flex:1 1 60vh}
    header{padding:11px 14px 9px}
    .masthead h1{font-size:18px}
    #panelScroll{padding:14px 15px 30px}
    .card-body .claim{font-size:15.5px;line-height:1.66}
    .chip{padding:5px 11px;font-size:11.5px}
    .theme{padding:4px 10px;font-size:11px}
    .read-link{padding:12px 14px;font-size:13px}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>

    "grounds":"#3A6EA5",
    "paired-with":"#7A5C9E"
  };
  const relOrder = ["supports","contradicts","complicates","grounds","paired-with"];
  const evOrder = ["High (causal)","Medium","Low","Argument","Context"];
  const evAbbr = {"High (causal)":"HIGH","Medium":"MED","Low":"LOW","Argument":"ARG","Context":"CTX"};
  const linkLabel = lt => ({arxiv:"arXiv",doi:"via DOI",pdf:"PDF",open:"open access",
    publisher:"publisher",book:"publisher page",report:"report"}[lt] || "link");

  const nodes = C.nodes.map(d => ({...d}));
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const links = C.edges.map((e,i) => ({i, source:e[0], target:e[1]===undefined?null:e[0], rel:e[1], note:e[3]}));
  // fix mapping: edges are [src, rel, dst, note]
  links.forEach((l,i)=>{ const e=C.edges[i]; l.source=e[0]; l.rel=e[1]; l.target=e[2]; l.note=e[3]; });

  document.getElementById("countLabel").textContent =
    nodes.length + " SOURCES \u00B7 " + links.length + " RELATIONS";

  // ---------- state ----------
  const state = { q:"", camps:new Set(), evs:new Set(), section:"", rels:new Set(relOrder), selected:null };

  // ---------- header controls ----------
  const campWrap = document.getElementById("campChips");
  Object.keys(campColor).forEach(camp=>{
    const b=document.createElement("button");
    b.className="chip"; b.dataset.camp=camp;
    b.innerHTML='<span class="dot" style="background:'+campColor[camp]+'"></span>'+camp;
    b.onclick=()=>{ state.camps.has(camp)?state.camps.delete(camp):state.camps.add(camp); b.classList.toggle("active"); refresh(); };
    campWrap.appendChild(b);
  });
  const evWrap = document.getElementById("evChips");
  evOrder.forEach(ev=>{
    const b=document.createElement("button");
    b.className="chip"; b.textContent=evAbbr[ev];
    b.title=ev;
    b.onclick=()=>{ state.evs.has(ev)?state.evs.delete(ev):state.evs.add(ev); b.classList.toggle("active"); refresh(); };
    evWrap.appendChild(b);
  });
  const secSel = document.getElementById("sectionSel");
  Object.entries(C.sections).forEach(([k,v])=>{
    const o=document.createElement("option"); o.value=k; o.textContent=k+". "+v; secSel.appendChild(o);
  });
  secSel.onchange=()=>{ state.section=secSel.value; refresh(); };
  const edgeWrap=document.getElementById("edgeToggles");
  relOrder.forEach(rel=>{
    const b=document.createElement("button");
    b.className="chip edge-toggle";
    b.innerHTML='<span class="swatch" style="background:'+relColor[rel]+'"></span>'+rel;
    b.onclick=()=>{ state.rels.has(rel)?state.rels.delete(rel):state.rels.add(rel); b.classList.toggle("off"); refresh(); };
    edgeWrap.appendChild(b);
  });
  const searchEl=document.getElementById("search");
  searchEl.addEventListener("input",()=>{ state.q=searchEl.value.trim().toLowerCase(); refresh(); });
  document.getElementById("clearBtn").onclick=()=>{
    state.q=""; searchEl.value=""; state.camps.clear(); state.evs.clear(); state.section=""; secSel.value="";
    state.rels=new Set(relOrder); state.selected=null;
    document.querySelectorAll(".chip.active").forEach(c=>c.classList.remove("active"));
    document.querySelectorAll(".edge-toggle.off").forEach(c=>c.classList.remove("off"));
    refresh();
  };

  // ---------- matching ----------
  function matches(n){
    if(state.camps.size && !state.camps.has(n.camp)) return false;
    if(state.evs.size && !state.evs.has(n.evidence)) return false;
    if(state.section && String(n.section)!==state.section) return false;
    if(state.q){
      const hay=(n.label+" "+n.authors+" "+n.title+" "+n.claim+" "+n.type+" "+n.themes.join(" ")).toLowerCase();
      if(!hay.includes(state.q)) return false;
    }
    return true;
  }

  // ---------- graph ----------
  const svg=d3.select("#graph");
  const pane=document.getElementById("graphPane");
  let W=pane.clientWidth,H=pane.clientHeight;
  const g=svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.35,2.5]).on("zoom",ev=>g.attr("transform",ev.transform)));

  const linkSel=g.append("g").selectAll("line").data(links).join("line")
    .attr("stroke",d=>relColor[d.rel]).attr("stroke-width",1.5)
    .attr("stroke-dasharray",d=>d.rel==="paired-with"?"4 3":null)
    .attr("stroke-opacity",.55).style("cursor","pointer");
  const tooltip=document.getElementById("tooltip");
  linkSel.on("mousemove",(ev,d)=>{
    tooltip.style.display="block";
    tooltip.innerHTML="<b>"+byId[d.source.id||d.source].label+"</b> \u2014"+d.rel+"\u2192 <b>"+byId[d.target.id||d.target].label+"</b><br>"+d.note;
    const r=pane.getBoundingClientRect();
    tooltip.style.left=Math.min(ev.clientX-r.left+14,r.width-310)+"px";
    tooltip.style.top=(ev.clientY-r.top+10)+"px";
  }).on("mouseleave",()=>tooltip.style.display="none");

  const nodeSel=g.append("g").selectAll("g").data(nodes).join("g")
    .style("cursor","pointer")
    .call(d3.drag()
      .on("start",(ev,d)=>{ if(!ev.active) sim.alphaTarget(.25).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",(ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
      .on("end",(ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));
  nodeSel.append("circle")
    .attr("r",d=>d.evidence==="High (causal)"?11:9)
    .attr("fill",d=>campColor[d.camp])
    .attr("stroke",d=>d.evidence==="High (causal)"?"#1C2630":"#FAF9F5")
    .attr("stroke-width",d=>d.evidence==="High (causal)"?2.5:1.5);
  nodeSel.append("text").attr("class","node-label").attr("dy",d=>(d.evidence==="High (causal)"?24:21))
    .text(d=>d.label);
  nodeSel.on("click",(ev,d)=>{ state.selected=d.id; refresh(); ev.stopPropagation(); });
  svg.on("click",()=>{ state.selected=null; refresh(); });

  const sim=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(95).strength(.5))
    .force("charge",d3.forceManyBody().strength(-300))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collide",d3.forceCollide(30))
    .on("tick",()=>{
      linkSel.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
             .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      nodeSel.attr("transform",d=>"translate("+d.x+","+d.y+")");
    });
  window.addEventListener("resize",()=>{
    W=pane.clientWidth;H=pane.clientHeight;
    sim.force("center",d3.forceCenter(W/2,H/2)).alpha(.3).restart();
  });

  // ---------- panel rendering ----------
  const panel=document.getElementById("panelScroll");
  function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  function renderList(matched){
    let h='<div class="list-head">'+(state.q||state.camps.size||state.evs.size||state.section
      ? matched.length+" matching source"+(matched.length===1?"":"s")
      : "All sources — click one, or click a node")+'</div>';
    if(!matched.length){ panel.innerHTML=h+'<div class="empty">Nothing matches. Loosen a filter or try a broader term.</div>'; return; }
    const sorted=[...matched].sort((a,b)=>a.section-b.section || a.label.localeCompare(b.label));
    h+=sorted.map(n=>
      '<div class="list-row" data-id="'+n.id+'" role="button" tabindex="0">'+
      '<span class="dot" style="background:'+campColor[n.camp]+'"></span>'+
      '<span class="lr-name">'+esc(n.label)+', <i>'+esc(n.title)+'</i></span>'+
      '<span class="lr-meta">S'+n.section+' \u00B7 '+evAbbr[n.evidence]+' \u00B7 '+n.year+'</span></div>'
    ).join("");
    panel.innerHTML=h;
    panel.querySelectorAll(".list-row").forEach(r=>{
      const go=()=>{ state.selected=r.dataset.id; refresh(); };
      r.onclick=go; r.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();go();} };
    });
  }

  function renderCard(n){
    const out=links.filter(l=>(l.source.id||l.source)===n.id);
    const inn=links.filter(l=>(l.target.id||l.target)===n.id);
    let relHtml="";
    relOrder.forEach(rel=>{
      const o=out.filter(l=>l.rel===rel), i=inn.filter(l=>l.rel===rel);
      if(!o.length && !i.length) return;
      relHtml+='<div class="rel-head"><span class="swatch" style="background:'+relColor[rel]+'"></span>'+rel+'</div>';
      o.forEach(l=>{
        const t=byId[l.target.id||l.target];
        relHtml+='<button class="rel-item" data-id="'+t.id+'"><span class="rel-arrow">\u2192</span><span class="rel-target">'+esc(t.label)+'</span><span class="rel-note">'+esc(l.note)+'</span></button>';
      });
      i.forEach(l=>{
        const s=byId[l.source.id||l.source];
        relHtml+='<button class="rel-item" data-id="'+s.id+'"><span class="rel-arrow">\u2190</span><span class="rel-target">'+esc(s.label)+'</span><span class="rel-note">'+esc(l.note)+'</span></button>';
      });
    });
    panel.innerHTML=
      '<button class="backlink" id="backBtn">\u2190 ALL SOURCES</button>'+
      '<div class="card">'+
        '<div class="card-top"><span>S'+n.section+' \u00B7 '+esc(evAbbr[n.evidence])+' \u00B7 '+n.year+'</span>'+
        '<span class="camp-tag"><span class="dot" style="background:'+campColor[n.camp]+'"></span>'+esc(n.camp)+'</span></div>'+
        '<div class="card-body">'+
          '<h2>'+esc(n.title)+'</h2>'+
          '<div class="byline">'+esc(n.authors)+'</div>'+
          '<div class="typeline">'+esc(n.type)+' \u00B7 Section '+n.section+': '+esc(C.sections[n.section])+'</div>'+
          '<div class="claim">'+esc(n.claim)+'</div>'+
          (n.url?'<a class="read-link" href="'+esc(n.url)+'" target="_blank" rel="noopener noreferrer">Read the source ↗<span class="lt">'+esc(linkLabel(n.link_type))+'</span></a>':'')+
          '<div class="themes">'+n.themes.map(t=>'<button class="theme" data-t="'+esc(t)+'">'+esc(t)+'</button>').join("")+'</div>'+
        '</div>'+
        (relHtml?'<div class="rel-section">'+relHtml+'</div>':'')+
      '</div>';
    document.getElementById("backBtn").onclick=()=>{ state.selected=null; refresh(); };
    panel.querySelectorAll(".rel-item").forEach(b=>b.onclick=()=>{ state.selected=b.dataset.id; refresh(); });
    panel.querySelectorAll(".theme").forEach(b=>b.onclick=()=>{
      state.selected=null; state.q=b.dataset.t.toLowerCase(); searchEl.value=b.dataset.t; refresh();
    });
  }

  // ---------- refresh ----------
  function refresh(){
    const active=new Set(nodes.filter(matches).map(n=>n.id));
    const filtering=!!(state.q||state.camps.size||state.evs.size||state.section);
    nodeSel.transition().duration(150)
      .style("opacity",d=>{
        if(state.selected){
          if(d.id===state.selected) return 1;
          const neighbor=links.some(l=>state.rels.has(l.rel)&&(((l.source.id||l.source)===state.selected&&(l.target.id||l.target)===d.id)||((l.target.id||l.target)===state.selected&&(l.source.id||l.source)===d.id)));
          return neighbor?0.95:0.12;
        }
        return (!filtering||active.has(d.id))?1:0.12;
      });
    linkSel.transition().duration(150)
      .style("opacity",d=>{
        if(!state.rels.has(d.rel)) return 0;
        const s=d.source.id||d.source, t=d.target.id||d.target;
        if(state.selected) return (s===state.selected||t===state.selected)?0.9:0.05;
        if(filtering) return (active.has(s)&&active.has(t))?0.7:0.05;
        return 0.55;
      })
      .attr("stroke-width",d=>{
        const s=d.source.id||d.source, t=d.target.id||d.target;
        return state.selected&&(s===state.selected||t===state.selected)?2.5:1.5;
      });
    if(state.selected&&byId[state.selected]) renderCard(byId[state.selected]);
    else renderList(nodes.filter(matches));
  }
  refresh();
})();
</script>
</body>
</html>
